<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Minimalist and modern tech startup logo for a developer tool -->
  <!-- Solid clean white background -->
  <rect width="512" height="512" fill="#FFFFFF" rx="112" />
  
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- "n" in deep zinc-950 -->
    <!-- Stem -->
    <path d="M 160 376 V 160" stroke="#09090B" stroke-width="72" />
    
    <!-- Arc and right leg -->
    <path d="M 160 256 C 160 120, 352 120, 352 256 V 376" stroke="#09090B" stroke-width="72" />
    
    <!-- Code bracket symbol "< >" cleverly integrated into the negative space -->
    <!-- "<" Zinc-400 -->
    <path d="M 240 290 L 205 325 L 240 360" stroke="#A1A1AA" stroke-width="32" />
    
    <!-- ">" Emerald-400 -->
    <path d="M 272 290 L 307 325 L 272 360" stroke="#34D399" stroke-width="32" />
  </g>
</svg>
