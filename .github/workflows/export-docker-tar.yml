name: Export Docker TAR Artifact

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: latest

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Set image name (lowercase for Docker)
        id: image_name
        run: echo "image_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest image from GHCR
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ steps.image_name.outputs.image_name }}:${{ env.IMAGE_TAG }}
        run: docker pull "$IMAGE_REF"

      - name: Export compressed TAR artifact
        id: export
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ steps.image_name.outputs.image_name }}:${{ env.IMAGE_TAG }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          mkdir -p dist

          ARCHIVE_NAME="${REPO_NAME}-${IMAGE_TAG}.tar.gz"
          docker save "$IMAGE_REF" | gzip -1 > "dist/${ARCHIVE_NAME}"
          shasum -a 256 "dist/${ARCHIVE_NAME}" > "dist/${ARCHIVE_NAME}.sha256"
          docker image inspect "$IMAGE_REF" --format '{{index .RepoDigests 0}}' > "dist/${REPO_NAME}-${IMAGE_TAG}.image.txt"

          echo "archive_name=${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload TAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-docker-tar-latest
          path: dist/
          retention-days: 14

      - name: Write workflow summary
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ steps.image_name.outputs.image_name }}:${{ env.IMAGE_TAG }}
        run: |
          {
            echo "## TAR export complete"
            echo
            echo "- Source image: \`${IMAGE_REF}\`"
            echo "- Artifact: \`${{ github.event.repository.name }}-docker-tar-latest\`"
            echo "- Archive file: \`${{ steps.export.outputs.archive_name }}\`"
            echo "- Retention: \`14 days\`"
            echo
            echo "Download the artifact from this run's **Artifacts** section."
          } >> "$GITHUB_STEP_SUMMARY"
